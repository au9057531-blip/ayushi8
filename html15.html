<!DOCTYPE html>
<html>
<head>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}

button{
    padding:20px 40px;
    font-size:24px;
    color:#fff;
    background:none;
    border:2px solid cyan;
    cursor:pointer;
    box-shadow:0 0 20px cyan;
    transition:.3s;
}

button:hover{
    box-shadow:0 0 50px cyan;
}
</style>
</head>
<body>

<button>CLICK ME</button>

</body>
</html>
