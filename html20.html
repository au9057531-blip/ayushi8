<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

.cursor{
    width:20px;
    height:20px;
    border-radius:50%;
    background:white;
    position:absolute;
}
</style>
</head>
<body>

<div class="cursor"></div>

<script>
let cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",(e)=>{
 cursor.style.left=e.pageX+"px";
 cursor.style.top=e.pageY+"px";
});
</script>

</body>
</html>
